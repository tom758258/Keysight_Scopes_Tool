name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - Codex

jobs:
  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages
        run: python -m pip install --upgrade pip && python -m pip install -e ".[all,dev]"

      - name: Run tests
        run: python -m pytest -q -m "not hardware"

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages
        run: python -m pip install --upgrade pip && python -m pip install -e ".[all,dev]"

      - name: Run tests
        run: python -m pytest -q -m "not hardware"
