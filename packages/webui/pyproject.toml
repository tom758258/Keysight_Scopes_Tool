[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-scope-webui"
version = "0.1.0"
description = "WebUI skeleton for Keysight InfiniiVision oscilloscope control."
requires-python = ">=3.10"
dependencies = ["keysight-scope-core==0.1.0"]

[tool.setuptools.packages.find]
where = ["src"]
