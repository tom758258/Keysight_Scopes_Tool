[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-scope-core"
version = "0.1.0"
description = "Core runtime for Keysight InfiniiVision oscilloscope control over PyVISA."
requires-python = ">=3.10"
dependencies = ["pyvisa>=1.14"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]
